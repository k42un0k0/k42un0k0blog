version: "2"
services:
  app:
    build:
      context: ./
      dockerfile: ./docker/back.Dockerfile
    volumes:
      - ./back:/app
    working_dir: /app
    ports:
      - "8080:8080"
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
    ports:
      - "3306:3306"
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--default-authentication-plugin=mysql_native_password",
      ]
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=example
    ports:
      - 8081:80
    volumes:
      - /sessions
