get:
  description: ブログ一覧の取得
  operationId: blogList
  responses:
    "200":
      description: successfully request
      content:
        application/json; charset=utf-8:
          schema:
            type: array
            items:
              $ref: ../components/blog_response.yml
post:
  description: ブログの作成
  operationId: blogCreate
  requestBody:
    content:
      application/json; charset=utf-8:
        schema:
          type: object
          properties:
            title:
              type: string
            body:
              type: string
            blogType:
              type: number
          required:
            - title
            - body
            - blogType
  responses:
    "200":
      description: successfully request
      content:
        application/json; charset=utf-8:
          schema:
            $ref: ../components/blog_response.yml
    "401":
      description: authorization error