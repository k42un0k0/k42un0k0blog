get:
  description: ユーザーの取得
  operationId: userGet
  parameters:
    - in: path
      name: id
      schema:
        type: integer
      required: true
  responses:
    "200":
      description: successfully request
      content:
        application/json; charset=utf-8:
          schema:
            $ref: "../components/user_response.yml"
put:
  description: ユーザーの更新
  operationId: userUpdate
  parameters:
    - in: path
      name: id
      schema:
        type: integer
      required: true
  requestBody:
    content:
      application/json; charset=utf-8:
        schema:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
  responses:
    "200":
      description: successfully request
      content:
        application/json; charset=utf-8:
          schema:
            $ref: "../components/user_response.yml"
    "401":
      description: authorization error